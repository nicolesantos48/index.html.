<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Aventureiro pelo Mundo 🌍</title>
    <style>
        body { margin: 0; background: #1a1a1a; overflow: hidden; font-family: 'Segoe UI', sans-serif; }
        #hud, #menu { position: absolute; width: 100%; text-align: center; z-index: 10; }
        #hud { 
            top: 20px; color: white; font-size: 20px; font-weight: bold;
            display: none; justify-content: center; gap: 20px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
        }
        #menu {
            top: 0; height: 100%; background: linear-gradient(135deg, #0f2027 0%, #2c5364 100%);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            color: white; z-index: 100;
        }
        button {
            padding: 18px 50px; font-size: 26px; cursor: pointer; border-radius: 40px;
            border: none; background: #009739; color: white; font-weight: bold;
            box-shadow: 0 8px 20px rgba(0,151,57,0.4); transition: 0.3s;
        }
        button:hover { transform: scale(1.1); background: #fedd00; color: #004b1c; }
        #speech-bubble {
            position: absolute; bottom: 25%; left: 50%; transform: translateX(-50%);
            background: white; padding: 20px 30px; border-radius: 25px;
            font-weight: bold; color: #333; display: none; z-index: 20;
            border: 4px solid #009739; box-shadow: 0 10px 40px rgba(0,0,0,0.6);
        }
    </style>
</head>
<body>
    <div id="menu">
        <h1 style="font-size: 3.5em; margin-bottom: 10px;">🌍 AVENTUREIRO PELO MUNDO</h1>
        <p style="font-size: 1.2em; margin-bottom: 30px;">Viaje por 15 países e conquiste a glória no Brasil!</p>
        <button onclick="startGame()">COMEÇAR JORNADA</button>
    </div>

    <div id="hud">
        <div>📍 <span id="country">...</span></div>
        <div>💰 <span id="coins">0</span></div>
        <div>❤️ <span id="lives">3</span></div>
        <div>⏱️ <span id="timer">30</span>s</div>
    </div>
    
    <div id="speech-bubble"></div>

    <script src="https://cloudflare.com"></script>
    <script>
        let scene, camera, renderer, player, playerBody, ground;
        let coins = [], enemies = [], fireworks = [], gameActive = false;
        let currentLevel = 0, score = 0, lives = 3, timeLeft = 30, timerInterval, fwInterval;
        const keys = {};
        let velocityY = 0, isGrounded = false;
        const gravity = -0.012, jumpStrength = 0.26;

        const levels = [
            { name: 'Japão', bg: 0xFFB7C5, ground: 0xEEEEEE, speed: 0.10, phrase: "Arigatou! Próximo destino! 🇯🇵" },
            { name: 'Egito', bg: 0xF4A460, ground: 0xEDC9AF, speed: 0.12, phrase: "As pirâmides são incríveis! 🇪🇬" },
            { name: 'França', bg: 0x2c3e50, ground: 0x7f8c8d, speed: 0.14, phrase: "Ooh la la! Partiu Itália! 🇫🇷" },
            { name: 'Itália', bg: 0x87CEEB, ground: 0x2ecc71, speed: 0.16, phrase: "Mamma mia! Que viagem! 🇮🇹" },
            { name: 'Alemanha', bg: 0x34495e, ground: 0x2c3e50, speed: 0.17, phrase: "Rápido! Vamos para a Austrália! 🇩🇪" },
            { name: 'Austrália', bg: 0xFF7F50, ground: 0x8B4513, speed: 0.18, phrase: "G'day mate! Próxima parada! 🇦🇺" },
            { name: 'Canadá', bg: 0xffffff, ground: 0xc0392b, speed: 0.19, phrase: "Muito gelo! Indo para a China! 🇨🇦" },
            { name: 'China', bg: 0xc0392b, ground: 0xf1c40f, speed: 0.20, phrase: "Ni hao! Agora EUA! 🇨🇳" },
            { name: 'EUA', bg: 0x2980b9, ground: 0xecf0f1, speed: 0.21, phrase: "See you! Rumo à Grécia! 🇺🇸" },
            { name: 'Grécia', bg: 0x3498db, ground: 0xffffff, speed: 0.22, phrase: "História pura! México agora! 🇬🇷" },
            { name: 'México', bg: 0xe67e22, ground: 0x27ae60, speed: 0.23, phrase: "¡Viva México! Indo para o Marrocos! 🇲🇽" },
            { name: 'Marrocos', bg: 0xd35400, ground: 0xf39c12, speed: 0.24, phrase: "Incrível! Tailândia agora! 🇲🇦" },
            { name: 'Tailândia', bg: 0x1abc9c, ground: 0x2980b9, speed: 0.25, phrase: "Sawasdee! Quase em casa! 🇹🇭" },
            { name: 'Índia', bg: 0x9b59b6, ground: 0xf39c12, speed: 0.26, phrase: "Namastê! É HORA DA FINAL! 🇮🇳" },
            { name: 'BRASIL (FINAL)', bg: 0x009739, ground: 0xFEDD00, speed: 0.35, phrase: "FINALMENTE EM CASA! EU VENCI! 🇧🇷🏆" }
        ];

        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        function playSound(type) {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            
            if (type === 'coin') {
                osc.frequency.setValueAtTime(950, audioCtx.currentTime);
                gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
                osc.start(); osc.stop(audioCtx.currentTime + 0.1);
            } else if (type === 'win') {
                const notes = [523.25, 659.25, 783.99, 1046.50]; 
                notes.forEach((f, i) => {
                    const o = audioCtx.createOscillator(); const g = audioCtx.createGain();
                    o.connect(g); g.connect(audioCtx.destination);
                    o.frequency.value = f; g.gain.setValueAtTime(0.1, audioCtx.currentTime + i * 0.15);
                    o.start(audioCtx.currentTime + i * 0.15); o.stop(audioCtx.currentTime + i * 0.15 + 0.1);
                });
            } else if (type === 'hit') {
                osc.type = 'sawtooth'; osc.frequency.value = 80;
                gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.3);
                osc.start(); osc.stop(audioCtx.currentTime + 0.3);
            }
        }

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);
            scene.add(new THREE.AmbientLight(0xffffff, 0.6));
            const light = new THREE.DirectionalLight(0xffffff, 1);
            light.position.set(5, 10, 5); scene.add(light);
            createPlayer();
            animate();
        }

        function startGame() {
            document.getElementById('menu').style.display = 'none';
            document.getElementById('hud').style.display = 'flex';
            gameActive = true;
            createLevel();
        }

        function createPlayer() {
            player = new THREE.Group();
            playerBody = new THREE.Mesh(new THREE.CapsuleGeometry(0.4, 0.8), new THREE.MeshPhongMaterial({ color: 0xFF6347 }));
            playerBody.position.y = 0.8;
            player.add(playerBody);
            scene.add(player);
        }

        function createLevel() {
            const lvl = levels[currentLevel % levels.length];
            scene.background = new THREE.Color(lvl.bg);
            document.getElementById('country').innerText = lvl.name;
            playerBody.material.color.setHex(lvl.name.includes("BRASIL") ? 0x004b1c : 0xFF6347);

            coins.forEach(c => scene.remove(c)); enemies.forEach(e => scene.remove(e));
            if(ground) scene.remove(ground);
            coins = []; enemies = [];

            ground = new THREE.Mesh(new THREE.BoxGeometry(110, 1, 10), new THREE.MeshPhongMaterial({ color: lvl.ground }));
            ground.position.y = -0.5; scene.add(ground);

            for (let i = 0; i < 5; i++) {
                const coin = new THREE.Mesh(new THREE.TorusGeometry(0.3, 0.1), new THREE.MeshPhongMaterial({ color: 0xFFD700 }));
                coin.position.set(i * 18 - 35, 1.5, 0); scene.add(coin); coins.push(coin);
            }

            for (let i = 0; i < 3; i++) {
                const enemy = new THREE.Mesh(new THREE.ConeGeometry(0.6, 1.2), new THREE.MeshPhongMaterial({ color: 0x333333 }));
                enemy.position.set(i * 25 - 10, 0.6, 0); enemy.userData = { dir: 1, speed: lvl.speed };
                scene.add(enemy); enemies.push(enemy);
            }
            player.position.set(-50, 5, 0); timeLeft = 30; startTimer();
        }

        function startTimer() {
            clearInterval(timerInterval);
            timerInterval = setInterval(() => { if(gameActive) { timeLeft--; document.getElementById('timer').innerText = timeLeft; if(timeLeft <= 0) loseLife(); }}, 1000);
        }

        function launchFirework() {
            if (fireworks.length > 8) return; 
            const geo = new THREE.BufferGeometry();
            const pos = new Float32Array(150);
            const startX = player.position.x + (Math.random()-0.5)*10;
            const startY = 2 + Math.random()*5;
            for(let i=0; i<150; i+=3) { pos[i] = startX; pos[i+1] = startY; pos[i+2] = (Math.random()-0.5)*2; }
            geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
            const fw = new THREE.Points(geo, new THREE.PointsMaterial({ color: Math.random() * 0xffffff, size: 0.15 }));
            fw.userData = { life: 50 };
            scene.add(fw); fireworks.push(fw);
        }

        function update() {
            if (!gameActive) return;

            if ((keys['a'] || keys['ArrowLeft']) && player.position.x > -52) { player.position.x -= 0.2; player.rotation.y = -Math.PI/2; }
            if ((keys['d'] || keys['ArrowRight']) && player.position.x < 52) { player.position.x += 0.2; player.rotation.y = Math.PI/2; }

            velocityY += gravity; player.position.y += velocityY;
            if (player.position.y <= 0) { player.position.y = 0; velocityY = 0; isGrounded = true; } else isGrounded = false;

            coins.forEach((c, i) => {
                c.rotation.y += 0.05;
                if (player.position.distanceTo(c.position) < 1.2) { playSound('coin'); scene.remove(c); coins.splice(i, 1); score += 10; document.getElementById('coins').innerText = score; }
            });

            enemies.forEach(e => {
                e.position.x += e.userData.dir * e.userData.speed; if (Math.abs(e.position.x) > 52) e.userData.dir *= -1;
                if (player.position.distanceTo(e.position) < 1) loseLife();
            });

            if (coins.length === 0) nextLevel();
            
            fireworks.forEach((fw, i) => {
                const positions = fw.geometry.attributes.position.array;
                for(let j=0; j<positions.length; j++) { positions[j] += (Math.random()-0.5)*0.15; }
                fw.geometry.attributes.position.needsUpdate = true;
                if(--fw.userData.life <= 0) { scene.remove(fw); fireworks.splice(i, 1); }
            });

            camera.position.lerp(new THREE.Vector3(player.position.x, 3, 11), 0.1);
            camera.lookAt(player.position.x, 1, 0);
        }

        function nextLevel() {
            gameActive = false; Object.keys(keys).forEach(k => keys[k] = false); 
            clearInterval(timerInterval); playSound('win');
            if(levels[currentLevel].name.includes("BRASIL")) { 
                fwInterval = setInterval(launchFirework, 250); 
            }
            const bubble = document.getElementById('speech-bubble');
            bubble.innerText = levels[currentLevel % levels.length].phrase; bubble.style.display = 'block';
            setTimeout(() => {
                bubble.style.display = 'none';
                clearInterval(fwInterval);
                if(currentLevel === levels.length - 1) { alert("🏆 CAMPEÃO MUNDIAL! PARABÉNS!"); location.reload(); }
                else { currentLevel++; gameActive = true; createLevel(); }
            }, 3500);
        }

        function loseLife() { playSound('hit'); lives--; document.getElementById('lives').innerText = lives; if (lives <= 0) { alert("GAME OVER!"); location.reload(); } else { gameActive = false; setTimeout(() => { gameActive = true; createLevel(); }, 500); }}

        window.addEventListener('keydown', e => { keys[e.key] = true; if((e.key === ' ' || e.key === 'w' || e.key === 'ArrowUp') && isGrounded) velocityY = jumpStrength; });
        window.addEventListener('keyup', e => keys[e.key] = false);
        window.addEventListener('resize', () => { camera.aspect = window.innerWidth/window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth, window.innerHeight); });
        function animate() { requestAnimationFrame(animate); update(); renderer.render(scene, camera); }
        init();
    </script>
</body>
</html>
